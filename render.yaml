databases:
  - name: evident-db
    plan: free

services:
  - type: web
    name: evident-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: evident-db
          property: connectionString
      - key: NOMBA_BASE_URL
        value: https://sandbox.nomba.com
      - key: NOMBA_CLIENT_ID
        sync: false
      - key: NOMBA_PRIVATE_KEY
        sync: false
      - key: NOMBA_ACCOUNT_ID
        sync: false
      - key: NOMBA_SUB_ACCOUNT_ID
        sync: false
      - key: NOMBA_SIGNATURE_KEY
        value: ""
      - key: APP_BASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
